components:
  schemas:
    AIModel:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        model:
          type: string
          description: OpenAI model name
          maxLength: 200
        display_name:
          type: string
          maxLength: 200
        system_message:
          type: string
          description: Default system message
        max_tokens:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        is_ga:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        order:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        input_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,9})?$
          description: The cost per token for input. E.g., $0.0015 / 1K tokens means
            $0.0000015 per token.
        output_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,9})?$
          description: The cost per token for output. E.g., $0.002 / 1K tokens means
            $0.000002 per token.
        markup:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          description: 'The multiplier that we charge above our cost. Default: at
            cost'
      required:
      - created_at
      - display_name
      - id
      - max_tokens
      - model
      - system_message
      - updated_at
    AIPersonality:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        creator:
          type: string
          readOnly: true
        display_name:
          type: string
          maxLength: 200
        system_message:
          type: string
        is_public:
          type: boolean
      required:
      - creator
      - display_name
      - id
      - system_message
    AccessEnum:
      enum:
      - private
      - members
      - public
      type: string
      description: |-
        * `private` - private
        * `members` - members
        * `public` - public
    BlankEnum:
      enum:
      - ''
    CategoryEnum:
      enum:
      - ART
      - COMEDY
      - COMMUNITY
      - CHARITY
      - CRYPTO
      - EDUCATION
      - FICTION
      - FOR TRADE
      - FREE2Z
      - FUNDRAISING
      - GAMING
      - HEALTH
      - LIFESTYLE
      - MATH
      - MUSIC
      - PODCAST
      - POLITICS
      - RELIEF
      - SCIENCE
      - SERVICE
      - SPORTS
      - TECHNOLOGY
      - ZCASH
      type: string
      description: |-
        * `` - None
        * `ART` - Art
        * `COMEDY` - Comedy
        * `COMMUNITY` - Community
        * `CHARITY` - Charity
        * `CRYPTO` - Crypto
        * `EDUCATION` - Education
        * `FICTION` - Fiction
        * `FOR TRADE` - For Trade
        * `FREE2Z` - Free2z
        * `FUNDRAISING` - Fundraising
        * `GAMING` - Gaming
        * `HEALTH` - Health
        * `LIFESTYLE` - Lifestyle
        * `MATH` - Math
        * `MUSIC` - Music
        * `PODCAST` - Podcast
        * `POLITICS` - Politics
        * `RELIEF` - Relief
        * `SCIENCE` - Science
        * `SERVICE` - Service
        * `SPORTS` - Sports
        * `TECHNOLOGY` - Technology
        * `ZCASH` - Zcash
