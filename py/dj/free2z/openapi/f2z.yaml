      description: This is to get your own conversations and fork others.
      parameters:
      - in: query
        name: ai_model__model
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: user__username
        schema:
          type: string
      tags:
      - ai
      security:
      - cookieAuth: []
      - basicAuth: []
      - knoxApiToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedConversationList'
          description: ''
    post:
      operationId: ai_conversations_create
