<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.ico?v=5" sizes="32x32" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fafafa" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0c" />
    <script>
      // Preserve the classic UI's last theme when entering the new UI for the
      // first time. This runs before mode-watcher to avoid a theme flash.
      try {
        const modeKey = "mode-watcher-mode";
        if (localStorage.getItem(modeKey) === null) {
          const classicState = JSON.parse(
            localStorage.getItem("global") || "null",
          );
          if (typeof classicState?.darkmode === "boolean") {
            localStorage.setItem(
              modeKey,
              classicState.darkmode ? "dark" : "light",
            );
          }
        }
      } catch {
        // Storage may be unavailable; mode-watcher will use the system theme.
      }
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
